<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0a0d14" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Pose-Runner Controller</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: #0a0d14; color: #e8eaf0; font-family: system-ui, -apple-system, sans-serif; overscroll-behavior: none; }
      body { min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; }
      #stage { position: relative; flex: 1; overflow: hidden; }
      #video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); background: #000; }
      #overlay { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; transform: scaleX(-1); }
      #hud { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 12px; pointer-events: none; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
      #status { padding: 6px 10px; border-radius: 999px; background: rgba(0,0,0,0.55); }
      #status.ok { background: rgba(30, 110, 60, 0.7); }
      #status.warn { background: rgba(170, 90, 20, 0.7); }
      #status.err { background: rgba(170, 30, 30, 0.8); }
      #fps { padding: 6px 10px; border-radius: 999px; background: rgba(0,0,0,0.55); font-variant-numeric: tabular-nums; }
      #panel { padding: 16px; display: flex; flex-direction: column; gap: 12px; background: #0c1320; border-top: 1px solid #1a2235; }
      #room { font-family: ui-monospace, monospace; letter-spacing: 0.15em; font-size: 18px; }
      .row { display: flex; align-items: center; gap: 12px; }
      .btn { flex: 1; padding: 14px 18px; border: 0; border-radius: 14px; font-size: 16px; font-weight: 600; color: #0a0d14; background: #6fb0ff; cursor: pointer; touch-action: manipulation; }
      .btn:disabled { opacity: 0.4; background: #4a5b76; color: #cdd6e4; cursor: not-allowed; }
      .btn.secondary { background: #2a3247; color: #e8eaf0; }
      .btn.ready { background: #4dd185; }
      #last-action { font-family: ui-monospace, monospace; font-size: 12px; color: #92a0bd; min-height: 18px; }
      #toast { position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%); padding: 10px 14px; background: rgba(0,0,0,0.75); border-radius: 12px; font-size: 13px; transition: opacity 0.25s; pointer-events: none; }
      #toast.hidden { opacity: 0; }
      #calib-msg { font-size: 14px; color: #c8d3e8; }
    </style>
  </head>
  <body>
    <div id="stage">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <div id="hud">
        <div id="status">starting…</div>
        <div id="fps">--</div>
      </div>
      <div id="toast" class="hidden"></div>
    </div>
    <div id="panel">
      <div class="row">
        <div>Room: <span id="room">------</span></div>
        <div style="margin-left:auto" id="slot-label">slot: -</div>
      </div>
      <div id="calib-msg">tap calibrate, then stand straight, full body in frame.</div>
      <div class="row">
        <button id="btn-calibrate" class="btn secondary">calibrate</button>
        <button id="btn-ready" class="btn" disabled>ready</button>
      </div>
      <div id="last-action">awaiting connection…</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
